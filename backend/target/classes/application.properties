# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080
spring.application.name=smart-inventory

# ── MySQL ─────────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/smart_inventory_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── MongoDB — smart_supply database ──────────────────────────────────────────
spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.database=${MONGODB_DATABASE}

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# ── Cookie settings ───────────────────────────────────────────────────────────
# Name of the HttpOnly cookie that carries the JWT
app.cookie.name=${COOKIE_NAME}
# Same max-age as JWT expiration in seconds (86400 = 24 hours)
app.cookie.max-age=${COOKIE_MAX_AGE}
# Set to true in production (HTTPS only)
app.cookie.secure=${COOKIE_SECURE}
app.cookie.path=${COOKIE_PATH}
app.cookie.domain=${COOKIE_DOMAIN}
app.cookie.same-site=${COOKIE_SAME_SITE}

# ── OTP Settings ──────────────────────────────────────────────────────────────
otp.expiry.minutes=${OTP_EXPIRY_MINUTES}

# ── Email (JavaMailSender) ────────────────────────────────────────────────────
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000
mail.sender.email=${MAIL_USERNAME}

# ── CORS Allowed Origins ──────────────────────────────────────────────────────
cors.allowed.origins=${CORS_ALLOWED_ORIGINS}

# ── Swagger / OpenAPI ─────────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ── Multipart ─────────────────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── File Upload Directory ──────────────────────────────────────────────────────
# Images stored in uploads/products/ relative to the working directory (backend folder)
# Override via env var UPLOAD_DIR in production
app.upload.dir=${UPLOAD_DIR:uploads}

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.smartinventory=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
